<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comment Heading — web-fx-lab</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  :root { --accent: #8b7cf6; --dim: #77778a; }
  body { font-family: -apple-system, "PingFang SC", sans-serif; background: #101014; color: #ecebf2; padding: 12vh 8vw; max-width: 760px; margin: 0 auto; counter-reset: sec; }
  section { margin-bottom: 5rem; }
  h2 { font-size: clamp(1.6rem, 5vw, 2.6rem); font-weight: 800; transition: transform .25s; }
  h2::before {
    counter-increment: sec;
    content: "// " counter(sec, decimal-leading-zero) " — ";
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    font-size: .55em; font-weight: 400; vertical-align: .35em;
    color: var(--dim); letter-spacing: .05em;
    transition: color .25s;
  }
  section:hover h2 { transform: translateX(4px); }
  section:hover h2::before { color: var(--accent); }
  p { color: #9a99ad; margin-top: .8rem; line-height: 1.8; }
  @media (prefers-reduced-motion: reduce) { h2, h2::before { transition: none; } }
</style>
</head>
<body>
  <section>
    <h2>About</h2>
    <p>标题前缀是 CSS 计数器 + ::before 自动生成的,HTML 里只有 &lt;h2&gt;About&lt;/h2&gt;。加一章,编号自己长。</p>
  </section>
  <section>
    <h2>Works</h2>
    <p>等宽字体 + 弱化色的前缀,衬托无衬线粗体的标题本体——对比就是层次。</p>
  </section>
  <section>
    <h2>Contact</h2>
    <p>hover 时前缀点亮、标题右移 4px:克制,但有反馈。</p>
  </section>
</body>
</html>
