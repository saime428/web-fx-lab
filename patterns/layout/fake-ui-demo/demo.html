<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake UI Demo — web-fx-lab</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  :root { --ease: cubic-bezier(.22,1,.36,1); --accent: #8b7cf6; }
  body { font-family: -apple-system, "PingFang SC", sans-serif; background: #101014; color: #ecebf2; min-height: 100vh; display: grid; place-content: center; text-align: center; padding: 6vh 4vw; }
  h1 { margin-bottom: .4rem; }
  .hint { color: #77778a; margin-bottom: 2.2rem; }
  /* —— 假应用窗口 —— */
  .app { width: min(88vw, 560px); border: 1px solid #2b2b35; border-radius: 14px; overflow: hidden; background: #16161c; text-align: left; font-size: 12px; }
  .titlebar { display: flex; align-items: center; gap: 6px; padding: 10px 12px; border-bottom: 1px solid #2b2b35; }
  .titlebar i { width: 10px; height: 10px; border-radius: 50%; background: #3a3a46; }
  .titlebar span { margin-left: 8px; color: #77778a; letter-spacing: .06em; }
  .check { margin-left: auto; color: #7cf6a8; font-weight: 700; opacity: 0; }
  .body { display: grid; grid-template-columns: 170px 1fr; min-height: 220px; }
  aside { border-right: 1px solid #2b2b35; padding: 10px; display: grid; gap: 6px; align-content: start; }
  .row { display: flex; align-items: center; gap: 7px; padding: 6px 8px; border-radius: 6px; background: #1e1e26; opacity: 0; }
  .row i { width: 14px; height: 14px; border-radius: 4px; background: var(--accent); flex: none; }
  .row:nth-child(even) i { background: #47d8ff; }
  main { padding: 14px; display: grid; gap: 12px; align-content: start; }
  .prop { display: grid; gap: 5px; opacity: 0; }
  .prop small { color: #77778a; }
  .bar { height: 8px; border-radius: 4px; background: #23232c; overflow: hidden; }
  .bar b { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--accent), #47d8ff); transform: scaleX(0); transform-origin: left; }
  .timeline { position: relative; height: 26px; border-top: 1px dashed #2b2b35; margin-top: 4px; }
  .kf { position: absolute; top: 9px; width: 9px; height: 9px; background: #e8ff47; rotate: 45deg; scale: 0; }
  /* —— 剧本(阶段类累加:已播的幕持续匹配,不重播) —— */
  @keyframes rowIn { from { opacity: 0; translate: -14px 0; } to { opacity: 1; translate: 0 0; } }
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes barGrow { to { transform: scaleX(var(--w, .8)); } }
  @keyframes kfPop { 0% { scale: 0; } 70% { scale: 1.5; } 100% { scale: 1; } }
  .s1 .row { animation: rowIn .45s var(--ease) both; }
  .s1 .row:nth-child(2) { animation-delay: 90ms; } .s1 .row:nth-child(3) { animation-delay: 180ms; }
  .s1 .row:nth-child(4) { animation-delay: 270ms; } .s1 .row:nth-child(5) { animation-delay: 360ms; }
  .s2 .prop { animation: fadeIn .3s both; }
  .s2 .bar b { animation: barGrow .7s var(--ease) .15s both; }
  .s2 .prop:nth-child(2) .bar b { animation-delay: .3s; }
  .s2 .prop:nth-child(3) .bar b { animation-delay: .45s; }
  .s2 .kf { animation: kfPop .4s var(--ease) both; }
  .s2 .kf:nth-child(2) { animation-delay: .55s; } .s2 .kf:nth-child(3) { animation-delay: .7s; }
  .s2 .kf:nth-child(4) { animation-delay: .85s; } .s2 .kf:nth-child(5) { animation-delay: 1s; }
  .s3 .check { animation: kfPop .45s var(--ease) both; }
  @media (prefers-reduced-motion: reduce) {
    .app * { animation: none !important; }
    .row, .prop, .check { opacity: 1 !important; translate: none !important; scale: none !important; }
    .bar b { transform: scaleX(var(--w, .8)) !important; }
    .kf { scale: 1 !important; }
  }
</style>
</head>
<body>
  <div>
    <h1>假 UI 自演示</h1>
    <p class="hint">JS 只切状态类,编排全在 CSS——图层导入 → 属性生长 → 关键帧落位 → 完成</p>
    <div class="app" id="app" role="img" aria-label="产品演示动画:图层导入后,属性滑块与关键帧自动生成,最后显示已生成">
      <div aria-hidden="true">
        <div class="titlebar"><i></i><i></i><i></i><span>MOTION STUDIO</span><b class="check">✓ 已生成</b></div>
        <div class="body">
          <aside>
            <div class="row"><i></i>背景层</div>
            <div class="row"><i></i>标题文字</div>
            <div class="row"><i></i>图形 A</div>
            <div class="row"><i></i>图形 B</div>
            <div class="row"><i></i>粒子层</div>
          </aside>
          <main>
            <div class="prop"><small>位移 X</small><div class="bar"><b style="--w:.85"></b></div></div>
            <div class="prop"><small>透明度</small><div class="bar"><b style="--w:.6"></b></div></div>
            <div class="prop"><small>缩放</small><div class="bar"><b style="--w:.72"></b></div></div>
            <div class="timeline">
              <span class="kf" style="left:8%"></span><span class="kf" style="left:34%"></span>
              <span class="kf" style="left:61%"></span><span class="kf" style="left:88%"></span>
            </div>
          </main>
        </div>
      </div>
    </div>
  </div>
<script>
  // ===== 旋钮:剧本时刻表(ms)。比真软件慢 30%——观众在"看懂",不是在"用" =====
  const T = { KEYS: 1300, DONE: 3000, CLEAR: 4600, LOOP: 5400 };
  const app = document.getElementById('app');
  if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
    app.classList.add('s1', 's2', 's3');          // 静态完成态:信息完整,只是不演
  } else {
    (function cycle() {
      app.classList.add('s1');
      setTimeout(() => app.classList.add('s2'), T.KEYS);
      setTimeout(() => app.classList.add('s3'), T.DONE);
      setTimeout(() => app.classList.remove('s1', 's2', 's3'), T.CLEAR);  // 清场=回隐藏基态
      setTimeout(cycle, T.LOOP);
    })();
  }
</script>
</body>
</html>
