<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stagger Grid — web-fx-lab</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", sans-serif; background: #101014; color: #ecebf2; min-height: 100vh; display: grid; place-content: center; text-align: center; padding: 6vh 4vw; }
  h1 { font-size: clamp(1.4rem, 4vw, 2.4rem); margin-bottom: .4rem; }
  p { color: #77778a; margin-bottom: 2.5rem; }
  .grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 10px; width: min(80vw, 520px); margin: 0 auto; cursor: pointer; }
  .dot { aspect-ratio: 1; border-radius: 50%; background: #8b7cf6; transform: scale(.55); opacity: .35; transition: transform .5s cubic-bezier(.22,1,.36,1), opacity .5s; }
  .grid.wave .dot { transform: scale(1); opacity: 1; }
  @media (prefers-reduced-motion: reduce) { .dot { transition: none; } }
</style>
</head>
<body>
  <div>
    <h1>距离 = 延迟</h1>
    <p>点击网格任意位置,波纹从那里扩散(delay = 网格距离 × 60ms)</p>
    <div class="grid" role="button" tabindex="0" aria-label="点击触发波纹"></div>
  </div>
<script>
  const N = 13, grid = document.querySelector('.grid'), dots = [];
  for (let i = 0; i < N * N; i++) {
    const d = document.createElement('div');
    d.className = 'dot'; grid.appendChild(d); dots.push(d);
  }
  function wave(cx, cy) {
    grid.classList.remove('wave');
    void grid.offsetWidth;                         // 强制 reflow 重置过渡
    dots.forEach((d, i) => {
      const dist = Math.hypot(i % N - cx, Math.floor(i / N) - cy);
      d.style.transitionDelay = `${dist * 60}ms`;
    });
    grid.classList.add('wave');
    setTimeout(() => grid.classList.remove('wave'), 60 * Math.hypot(N, N) + 1600);
  }
  grid.addEventListener('click', e => {
    const r = grid.getBoundingClientRect();
    wave((e.clientX - r.left) / r.width * (N - 1), (e.clientY - r.top) / r.height * (N - 1));
  });
  grid.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); wave((N-1)/2, (N-1)/2); } });
  setTimeout(() => wave((N - 1) / 2, (N - 1) / 2), 400);   // 开场来一发
</script>
</body>
</html>
