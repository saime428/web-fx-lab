<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll-driven Shader — web-fx-lab</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", sans-serif; background: #05070d; color: #eef; height: 400vh; }
  canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }
  .hud { position: fixed; left: 50%; transform: translateX(-50%); text-align: center; z-index: 1; mix-blend-mode: difference; }
  .hud.top { top: 8vh; } .hud.bottom { bottom: 6vh; color: #9ab; font-size: .9rem; }
  h1 { font-size: clamp(1.4rem, 3.5vw, 2.4rem); letter-spacing: .05em; }
</style>
</head>
<body>
  <div class="hud top"><h1>滚动 = 雕刻</h1></div>
  <div class="hud bottom">滚动进度直接喂给 shader uniform · Igloo 管线的最小版</div>
  <canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const gl = canvas.getContext('webgl');
  const vs = 'attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}';
  const fs = `
precision highp float;
uniform vec2 uRes; uniform float uT; uniform float uP; // uP = 滚动进度 0~1
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
void main(){
  vec2 uv=(gl_FragCoord.xy*2.-uRes)/min(uRes.x,uRes.y);
  float n=noise(uv*3.+uT*.08)*.5+noise(uv*7.-uT*.05)*.25;
  float r=mix(.15,.85,uP);                          // 半径随进度生长
  float edge=length(uv)-r+n*mix(.05,.45,uP);        // 噪声侵蚀边缘,越滚越"结晶"
  float m=smoothstep(.02,.0,edge);
  vec3 deep=vec3(.02,.03,.06), iceA=vec3(.35,.65,.95), iceB=vec3(.85,.95,1.);
  vec3 col=mix(deep,mix(iceA,iceB,uP+n*.3),m);
  col+=pow(max(0.,1.-abs(edge)*14.),3.)*vec3(.4,.7,1.)*(.4+uP); // 边缘辉光
  gl_FragColor=vec4(col,1.);
}`;
  function sh(t, s) { const o = gl.createShader(t); gl.shaderSource(o, s); gl.compileShader(o); return o; }
  const prog = gl.createProgram();
  gl.attachShader(prog, sh(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog); gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer());
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,3,-1,-1,3]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog, 'p');
  gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
  const uRes = gl.getUniformLocation(prog, 'uRes'), uT = gl.getUniformLocation(prog, 'uT'), uP = gl.getUniformLocation(prog, 'uP');
  function resize() {
    const d = Math.min(devicePixelRatio, 2);
    canvas.width = innerWidth * d; canvas.height = innerHeight * d;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  addEventListener('resize', resize); resize();
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  let target = 0, cur = reduced ? 1 : 0;
  addEventListener('scroll', () => {
    target = scrollY / (document.body.scrollHeight - innerHeight);
  }, { passive: true });
  (function loop(t) {
    if (!reduced) cur += (target - cur) * 0.08;   // 进度平滑
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uT, t * 0.001);
    gl.uniform1f(uP, cur);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(loop);
  })(0);
</script>
</body>
</html>
