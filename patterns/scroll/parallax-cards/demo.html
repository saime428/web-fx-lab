<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallax Cards — web-fx-lab</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", sans-serif; background: #101014; color: #ecebf2; }
  header, footer { height: 90vh; display: grid; place-content: center; text-align: center; }
  header p, footer p { color: #77778a; margin-top: .6rem; }
  .field { position: relative; min-height: 160vh; padding: 10vh 6vw; }
  .card {
    position: absolute; border-radius: 18px; padding: 1.2rem 1.5rem;
    background: #1b1b22; border: 1px solid #2b2b35; will-change: transform;
    max-width: 240px; box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }
  .card b { color: #8b7cf6; display: block; margin-bottom: .3rem; }
  .card small { color: #9a99ad; }
  .c1 { top: 8%;  left: 8%; }
  .c2 { top: 20%; right: 10%; }
  .c3 { top: 42%; left: 22%; }
  .c4 { top: 55%; right: 24%; }
  .c5 { top: 74%; left: 10%; }
  .c6 { top: 82%; right: 8%; }
</style>
</head>
<body>
  <header>
    <h1>视差漂浮卡片</h1>
    <p>同屏不同速:快的近,慢的远</p>
  </header>
  <div class="field">
    <div class="card c1" data-speed="1.25"><b>speed 1.25</b><small>比页面快,显得离你近</small></div>
    <div class="card c2" data-speed="0.85"><b>speed 0.85</b><small>比页面慢,沉在远处</small></div>
    <div class="card c3" data-speed="1.1"><b>speed 1.1</b><small>轻微跟手</small></div>
    <div class="card c4" data-speed="0.9"><b>speed 0.9</b><small>轻微滞后</small></div>
    <div class="card c5" data-speed="1.3"><b>speed 1.3</b><small>最快的一张</small></div>
    <div class="card c6" data-speed="1"><b>speed 1.0</b><small>对照组:正常滚动</small></div>
  </div>
  <footer><p>偏移 = 离视口中心的距离 × (speed − 1)</p></footer>
<script>
  if (!matchMedia('(prefers-reduced-motion: reduce)').matches) {
    const items = [...document.querySelectorAll('[data-speed]')].map(el => ({ el, speed: +el.dataset.speed }));
    let ticking = false;
    function update() {
      ticking = false;
      items.forEach(({ el, speed }) => {
        const r = el.getBoundingClientRect();
        // 注意:rect 里含已应用的 transform,先扣掉再算,避免自反馈
        const applied = new DOMMatrixReadOnly(getComputedStyle(el).transform).m42;
        const fromCenter = r.top - applied + r.height / 2 - innerHeight / 2;
        el.style.transform = `translate3d(0, ${(fromCenter * (speed - 1)).toFixed(1)}px, 0)`;
      });
    }
    addEventListener('scroll', () => { if (!ticking) { ticking = true; requestAnimationFrame(update); } }, { passive: true });
    addEventListener('resize', update);
    update();
  }
</script>
</body>
</html>
