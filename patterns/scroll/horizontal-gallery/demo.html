<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizontal Scroll Gallery — web-fx-lab</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", sans-serif; background: #0d0d0d; color: #f2f2ee; }
  .intro, .outro { height: 100vh; display: grid; place-content: center; text-align: center; }
  .intro p, .outro p { color: #777; margin-top: .8rem; }
  h1 { font-size: clamp(2rem, 6vw, 4.5rem); letter-spacing: -.03em; }
  .accent { color: #c5f542; }

  .h-scroll { height: 300vh; position: relative; }
  .h-scroll .viewport { position: sticky; top: 0; height: 100vh; overflow: hidden; display: flex; align-items: center; }
  .track { display: flex; gap: 4vw; padding: 0 8vw; will-change: transform; }
  .card { flex: 0 0 auto; width: min(60vw, 520px); }
  .card .img { aspect-ratio: 4/3; border-radius: 10px; }
  .card:nth-child(1) .img { background: linear-gradient(135deg,#c5f542,#1a3a00); }
  .card:nth-child(2) .img { background: linear-gradient(135deg,#42d7f5,#00263a); }
  .card:nth-child(3) .img { background: linear-gradient(135deg,#f542a7,#3a0022); }
  .card:nth-child(4) .img { background: linear-gradient(135deg,#f5a742,#3a2200); }
  .card:nth-child(5) .img { background: linear-gradient(135deg,#9d42f5,#1d003a); }
  .card:nth-child(6) .img { background: linear-gradient(135deg,#f2f2ee,#555); }
  .card figcaption { display: flex; justify-content: space-between; color: #888; margin-top: .6rem; font-size: .85rem; }
  .card figcaption b { color: #c5f542; font-weight: 600; }
  .progress { position: fixed; left: 0; bottom: 0; height: 3px; width: 100%; transform-origin: left; transform: scaleX(0); background: #c5f542; }

  @media (prefers-reduced-motion: reduce) {
    .h-scroll { height: auto; }
    .h-scroll .viewport { position: static; height: auto; overflow-x: auto; }
    .track { transform: none !important; }
    .progress { display: none; }
  }
</style>
</head>
<body>
  <div class="intro"><div><h1>往下滚,<span class="accent">世界往右走</span></h1><p>纵向滚动进度 → 横向位移映射 ↓</p></div></div>

  <section class="h-scroll">
    <div class="viewport">
      <figure class="track">
        <figure class="card"><div class="img"></div><figcaption><span>Qatar</span><b>2024</b></figcaption></figure>
        <figure class="card"><div class="img"></div><figcaption><span>Miami GP</span><b>2024</b></figcaption></figure>
        <figure class="card"><div class="img"></div><figcaption><span>Monaco</span><b>2023</b></figcaption></figure>
        <figure class="card"><div class="img"></div><figcaption><span>Britain</span><b>2025</b></figcaption></figure>
        <figure class="card"><div class="img"></div><figcaption><span>Austria</span><b>2020</b></figcaption></figure>
        <figure class="card"><div class="img"></div><figcaption><span>US</span><b>2024</b></figcaption></figure>
      </figure>
    </div>
  </section>

  <div class="outro"><div><h1>回到<span class="accent">纵向</span></h1><p>方向的变化本身就是节奏</p></div></div>
  <div class="progress"></div>

<script>
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!reduced) {
    const section = document.querySelector('.h-scroll');
    const track = document.querySelector('.track');
    const bar = document.querySelector('.progress');
    const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
    let target = 0, cur = 0;
    function measure() {
      const r = section.getBoundingClientRect();
      const p = clamp(-r.top / (r.height - innerHeight), 0, 1);
      target = p * (track.scrollWidth - innerWidth);
      bar.style.transform = `scaleX(${p})`;
    }
    addEventListener('scroll', measure, { passive: true });
    addEventListener('resize', measure);
    (function loop() {
      cur += (target - cur) * 0.08;
      track.style.transform = `translate3d(${-cur}px,0,0)`;
      requestAnimationFrame(loop);
    })();
    measure();
  }
</script>
</body>
</html>
