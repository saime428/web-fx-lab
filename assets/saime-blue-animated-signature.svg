<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 84" role="img" aria-label="听风入海，向云而行。山水有期，自在无言。LINUX DO @saime">
  <style>
    @keyframes czInkIn{0%{opacity:0;transform:translateY(5px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes czLineDraw{0%{stroke-dashoffset:520;opacity:0}22%{stroke-dashoffset:0;opacity:.48}78%{stroke-dashoffset:0;opacity:.36}100%{stroke-dashoffset:520;opacity:0}}
    @keyframes czLineDrawLate{0%{stroke-dashoffset:520;opacity:0}22%{stroke-dashoffset:0;opacity:.38}78%{stroke-dashoffset:0;opacity:.32}100%{stroke-dashoffset:520;opacity:0}}
    @keyframes czSweep{0%{transform:translateX(-160px);opacity:0}22%{opacity:.18}72%{opacity:.12}100%{transform:translateX(820px);opacity:0}}
    @keyframes czPaperTurn{0%,23%{opacity:0;transform:translateX(-74px) scaleX(.72)}28%{opacity:.46;transform:translateX(0) scaleX(1)}36%{opacity:.22;transform:translateX(68px) scaleX(.84)}42%,73%{opacity:0;transform:translateX(118px) scaleX(.72)}78%{opacity:.46;transform:translateX(0) scaleX(1)}86%{opacity:.22;transform:translateX(68px) scaleX(.84)}92%,100%{opacity:0;transform:translateX(118px) scaleX(.72)}}
    @keyframes czFirstText{0%{visibility:visible;opacity:0;filter:blur(2.4px);transform:translateY(1px)}10%,40%{visibility:visible;opacity:1;filter:blur(0);transform:translateY(0)}48%{visibility:visible;opacity:0;filter:blur(2.4px);transform:translateY(-1px)}49%,100%{visibility:hidden;opacity:0;filter:blur(2.4px);transform:translateY(-1px)}}
    @keyframes czSecondText{0%,47%{visibility:hidden;opacity:0;filter:blur(2.4px);transform:translateY(1px)}48%{visibility:visible;opacity:0;filter:blur(2.4px);transform:translateY(1px)}56%,84%{visibility:visible;opacity:1;filter:blur(0);transform:translateY(0)}100%{visibility:visible;opacity:0;filter:blur(2px);transform:translateY(1px)}}
    .cz-bg{fill:#eef5fb;}
    .cz-grain{opacity:.42;}
    .cz-soft{opacity:.72;}
    .cz-sweep{animation:czSweep 9s ease-in-out infinite;}
    .cz-turn{animation:czPaperTurn 8.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
    .cz-rule{fill:none;stroke:#5b8fd6;stroke-width:1;stroke-linecap:round;stroke-dasharray:520;stroke-dashoffset:520;animation:czLineDraw 8.4s linear infinite both;}
    .cz-rule2{stroke:#7aa6c8;stroke-width:.75;animation-name:czLineDrawLate;opacity:.5;}
    .cz-line{font-size:22px;letter-spacing:1.3px;fill:#29425b;paint-order:stroke fill;stroke:#eef5fb;stroke-width:.9;transform-box:fill-box;transform-origin:center;font-family:"Noto Serif SC","Songti SC","STSong","SimSun",serif;}
    .cz-line-one{animation:czFirstText 8.4s ease-in-out infinite;}
    .cz-line-two{visibility:hidden;opacity:0;animation:czSecondText 8.4s ease-in-out infinite;}
    .cz-brand{font-family:"Inter","PingFang SC","Microsoft YaHei",sans-serif;font-size:8.4px;letter-spacing:1.35px;fill:#627e97;animation:czInkIn 1.1s ease .55s both;}
    .cz-name{font-family:"Noto Serif SC","Songti SC","STSong","SimSun",serif;font-size:10px;font-style:italic;letter-spacing:.55px;fill:#5b8fd6;}
    .cz-brand-rule{fill:none;stroke:#bfd0e3;stroke-width:.75;stroke-linecap:round;opacity:.75;animation:czInkIn 1.1s ease .55s both;}
    .cz-frame{fill:none;stroke:#c8d7e7;stroke-width:1;}
    .cz-frame-accent{fill:none;stroke:#5b8fd6;stroke-width:1.15;stroke-linecap:round;stroke-dasharray:46 584;opacity:.68;}
  </style>
  <defs>
    <linearGradient id="czWash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9fcff"/>
      <stop offset=".56" stop-color="#e9f1fb"/>
      <stop offset="1" stop-color="#e3eef9"/>
    </linearGradient>
    <linearGradient id="czSheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset=".45" stop-color="#ffffff" stop-opacity=".34"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="czTurnWash" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fffaf1" stop-opacity="0"/>
      <stop offset=".5" stop-color="#fffaf1" stop-opacity=".78"/>
      <stop offset="1" stop-color="#fffaf1" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="czPaper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".10"/>
      <stop offset="1" stop-color="#c7d9eb" stop-opacity=".05"/>
    </linearGradient>
    <radialGradient id="czWarm" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(132 38) rotate(18) scale(190 58)">
      <stop offset="0" stop-color="#5b8fd6" stop-opacity=".14"/>
      <stop offset="1" stop-color="#5b8fd6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="czGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(565 54) rotate(-12) scale(210 64)">
      <stop offset="0" stop-color="#8bb6df" stop-opacity=".14"/>
      <stop offset="1" stop-color="#8bb6df" stop-opacity="0"/>
    </radialGradient>
    
    <clipPath id="czClip"><rect x="8" y="7" width="664" height="70" rx="8"/></clipPath>
  </defs>
  <rect x="8" y="7" width="664" height="70" rx="8" fill="url(#czWash)"/>
  <g clip-path="url(#czClip)">
    <rect x="8" y="7" width="664" height="70" fill="#eef5fb" class="cz-bg"/>
    <rect x="8" y="7" width="664" height="70" fill="url(#czPaper)" class="cz-grain"/>
    <ellipse cx="132" cy="38" rx="190" ry="58" fill="url(#czWarm)" class="cz-soft"/>
    <ellipse cx="565" cy="54" rx="210" ry="64" fill="url(#czGreen)" class="cz-soft"/>
    <rect x="-150" y="7" width="132" height="70" fill="url(#czSheen)" class="cz-sweep"/>
    <rect x="280" y="18" width="120" height="35" rx="5" fill="url(#czTurnWash)" class="cz-turn"/>
    <path d="M57 43C116 24 178 27 235 40C302 56 361 57 430 39C498 21 573 24 626 42" class="cz-rule"/>
    <path d="M82 55C152 68 222 62 279 51C349 37 413 38 484 52C535 62 591 62 635 51" class="cz-rule cz-rule2"/>
  </g>
  <rect x="8" y="7" width="664" height="70" rx="8" class="cz-frame"/>
  <path d="M44 7H142M538 77H636" class="cz-frame-accent"/>
  <g text-anchor="middle">
    <text x="340" y="43" class="cz-line cz-line-one">&#x542C;&#x98CE;&#x5165;&#x6D77;&#xFF0C;&#x5411;&#x4E91;&#x800C;&#x884C;&#x3002;</text>
    <text x="340" y="43" class="cz-line cz-line-two">&#x5C71;&#x6C34;&#x6709;&#x671F;&#xFF0C;&#x81EA;&#x5728;&#x65E0;&#x8A00;&#x3002;</text>
    <path d="M222 65H286M394 65H458" class="cz-brand-rule"/>
    <text x="340" y="69" class="cz-brand">LINUX DO &#xB7; @saime</text>
  </g>
</svg>
