<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="web-fx-lab:炫酷网页效果沉淀库。21+ 个零依赖动效 pattern,live 预览,直接试玩。">
<title>web-fx-lab — 网页效果画廊</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  :root { --bg: #101014; --panel: #1b1b22; --line: #2b2b35; --dim: #77778a; --fg: #ecebf2; --accent: #8b7cf6; }
  body { font-family: -apple-system, "PingFang SC", sans-serif; background: var(--bg); color: var(--fg); }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 0 4vw; }
  header { padding: 14vh 0 8vh; }
  h1 { font-size: clamp(2.4rem, 7vw, 4.5rem); font-weight: 800; }
  h1 em { color: var(--accent); font-style: normal; }
  .sub { color: var(--dim); margin-top: 1rem; max-width: 40em; line-height: 1.7; }
  .sub a { color: var(--accent); }
  /* 卡片网格 */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 22px; padding-bottom: 10vh; }
  .card { display: block; border: 1px solid var(--line); border-radius: 16px; overflow: hidden; background: var(--panel); color: inherit; text-decoration: none; transition: border-color .25s, transform .25s; }
  .card:hover, .card:focus-visible { border-color: var(--accent); transform: translateY(-3px); outline: none; }
  /* 预览:桌面视口渲染,整体缩小(避免挤扁的移动端形态) */
  .view { aspect-ratio: 16/10; overflow: hidden; position: relative; background: var(--bg); }
  .view iframe { width: 250%; height: 250%; transform: scale(.4); transform-origin: 0 0; border: 0; pointer-events: none; /* 只读:滚动/hover 都不进 iframe */ }
  .meta { padding: .9rem 1.1rem; display: flex; align-items: baseline; gap: .6rem; }
  .meta b { font-size: 1.02rem; }
  .meta .cat { color: var(--dim); font-size: .82rem; }
  .meta .lv { margin-left: auto; color: var(--accent); font-size: .82rem; letter-spacing: .1em; white-space: nowrap; }
  .hintbar { color: var(--dim); font-size: .9rem; padding-bottom: 2rem; }
  /* 兜底与 footer */
  .fallback { border: 1px solid var(--line); border-radius: 16px; padding: 3rem; text-align: center; color: var(--dim); }
  .fallback a { color: var(--accent); }
  footer { border-top: 1px solid var(--line); padding: 3rem 0 5rem; color: var(--dim); line-height: 2; }
  footer a { color: var(--accent); text-decoration: none; }
  @media (prefers-reduced-motion: reduce) { .card { transition: none; } }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>web-fx-<em>lab</em></h1>
      <p class="sub">炫酷网页效果沉淀库:把获奖网站拆解成可复用的设计方法 + 零依赖单文件 demo。预览是活的;点卡片进全屏试玩。<a href="https://github.com/saime428/web-fx-lab">GitHub ↗</a></p>
    </header>
    <p class="hintbar" id="count"></p>
    <div class="grid" id="grid"></div>
    <footer>
      灵感源:<a href="https://github.com/saime428/web-fx-lab/tree/main/cases">10 个获奖站拆解(含运行时实测)→ cases/</a><br>
      选型给 AI 看:<a href="https://github.com/saime428/web-fx-lab/blob/main/INDEX.md">INDEX.md</a> · 交接:<a href="https://github.com/saime428/web-fx-lab/blob/main/HANDOVER.md">HANDOVER.md</a> · MIT License
    </footer>
  </div>
<script>
(async () => {
  const grid = document.getElementById('grid'), count = document.getElementById('count');
  const fail = () => {
    grid.innerHTML = '<div class="fallback">索引加载失败(本地 file:// 打开属预期)。<br><a href="https://github.com/saime428/web-fx-lab#pattern-索引">去 GitHub 看列表 ↗</a></div>';
  };
  try {
    const md = await (await fetch('INDEX.md')).text();
    // 按表头名定位列,不按索引——INDEX.md 调整列序不至于崩
    const lines = md.split('\n');
    const head = lines.findIndex(l => l.includes('| Pattern |'));
    if (head < 0) return fail();
    const cols = lines[head].split('|').map(s => s.trim());
    const col = name => cols.indexOf(name);
    const [cPat, cName, cLv, cMech] = [col('Pattern'), col('名称'), col('难度'), col('一句话机制')];
    const items = [];
    for (let i = head + 2; i < lines.length && lines[i].trim().startsWith('|'); i++) {
      const c = lines[i].split('|').map(s => s.trim());
      const link = /\[([^\]]+)\]\(([^)]+)\)/.exec(c[cPat] || '');
      if (!link) continue;
      items.push({ path: link[2], id: link[1], name: c[cName], lv: c[cLv], mech: c[cMech], cat: link[1].split('/')[0] });
    }
    if (!items.length) return fail();
    grid.innerHTML = items.map(p => `
      <a class="card" href="${p.path}demo.html" target="_blank" rel="noopener" title="${p.mech}">
        <div class="view"><iframe src="${p.path}demo.html" loading="lazy" title="${p.name} 预览" tabindex="-1"></iframe></div>
        <div class="meta"><b>${p.name}</b><span class="cat">${p.cat}</span><span class="lv">${p.lv}</span></div>
      </a>`).join('');
    count.textContent = `${items.length} 个 pattern · 全部零依赖单文件 · 预览只读,点卡片全屏试玩`;
  } catch (e) { fail(); }
})();
</script>
</body>
</html>
