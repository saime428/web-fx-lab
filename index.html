<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="web-fx-lab:炫酷网页效果沉淀库。21+ 个零依赖动效 pattern,live 预览,直接试玩。">
<title>web-fx-lab — 网页效果画廊</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  :root { --bg: #101014; --panel: #1b1b22; --line: #2b2b35; --dim: #77778a; --fg: #ecebf2; --accent: #8b7cf6; }
  body { font-family: -apple-system, "PingFang SC", sans-serif; background: var(--bg); color: var(--fg); }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 0 4vw; }
  /* 狗粮:canvas 氛围背景(patterns/3d-webgl/canvas-ambient-bg),透明度压低不抢卡片 */
  #bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: .55; }
  header { padding: 14vh 0 8vh; }
  h1 { font-size: clamp(2.4rem, 7vw, 4.5rem); font-weight: 800; }
  h1 em { color: var(--accent); font-style: normal; }
  .sub { color: var(--dim); margin-top: 1rem; max-width: 40em; line-height: 1.7; }
  .sub a { color: var(--accent); }
  /* 狗粮:split-text 行遮罩入场(patterns/text/split-text-reveal)。纯 CSS 自动播放:不依赖 rAF/JS,后台标签也跑,JS 关闭时降级为直接显示 */
  .reveal { overflow: hidden; }
  .reveal > span { display: inline-block; animation: rise .9s .05s cubic-bezier(.22,1,.36,1) both; }
  .reveal-fade { animation: fadeUp .8s .3s ease-out both; }
  @keyframes rise { from { transform: translateY(115%); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } }
  /* 卡片网格 */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 22px; padding-bottom: 10vh; }
  .card { display: block; border: 1px solid var(--line); border-radius: 16px; overflow: hidden; background: var(--panel); color: inherit; text-decoration: none; transition: border-color .25s, transform .25s, opacity .6s; opacity: 0; /* 狗粮:scroll-reveal 入场,仅 opacity 避开 hover transform 冲突 */ }
  .card.in { opacity: 1; }
  .card:hover, .card:focus-visible { border-color: var(--accent); transform: translateY(-3px); outline: none; }
  /* 预览:桌面视口渲染,整体缩小(避免挤扁的移动端形态) */
  .view { aspect-ratio: 16/10; overflow: hidden; position: relative; background: var(--bg); }
  .view iframe { width: 250%; height: 250%; transform: scale(.4); transform-origin: 0 0; border: 0; pointer-events: none; /* 只读:滚动/hover 都不进 iframe */ }
  .meta { padding: .9rem 1.1rem; display: flex; align-items: baseline; gap: .6rem; }
  .meta b { font-size: 1.02rem; }
  .meta .cat { color: var(--dim); font-size: .82rem; }
  .meta .lv { margin-left: auto; color: var(--accent); font-size: .82rem; letter-spacing: .1em; white-space: nowrap; }
  .hintbar { color: var(--dim); font-size: .9rem; padding-bottom: 2rem; }
  /* 筛选条 */
  .filters { position: sticky; top: 0; z-index: 5; background: color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter: blur(8px); padding: .9rem 0 1rem; margin-bottom: 1.4rem; border-bottom: 1px solid var(--line); display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; }
  .filters .sep { color: var(--line); margin: 0 .3rem; }
  .chip { background: none; border: 1px solid var(--line); color: var(--dim); padding: .35em 1em; border-radius: 2em; font: inherit; font-size: .85rem; cursor: pointer; transition: color .2s, border-color .2s; }
  .chip:hover, .chip:focus-visible { border-color: var(--accent); color: var(--fg); outline: none; }
  .chip[aria-pressed="true"] { background: var(--accent); border-color: var(--accent); color: #14101f; }
  .card[hidden] { display: none; }
  /* 兜底与 footer */
  .fallback { border: 1px solid var(--line); border-radius: 16px; padding: 3rem; text-align: center; color: var(--dim); }
  .fallback a { color: var(--accent); }
  footer { border-top: 1px solid var(--line); padding: 3rem 0 5rem; color: var(--dim); line-height: 2; }
  footer a { color: var(--accent); text-decoration: none; }
  @media (prefers-reduced-motion: reduce) {
    .card { transition: none; opacity: 1; }
    .reveal > span, .reveal-fade { animation: none; }
  }
</style>
</head>
<body>
  <canvas id="bg" aria-hidden="true"></canvas>
  <div class="wrap">
    <header>
      <h1 class="reveal"><span>web-fx-<em>lab</em></span></h1>
      <p class="sub reveal-fade">炫酷网页效果沉淀库:把获奖网站拆解成可复用的设计方法 + 零依赖单文件 demo。预览是活的;点卡片进全屏试玩。<a href="https://github.com/saime428/web-fx-lab">GitHub ↗</a></p>
    </header>
    <div class="filters" id="filters" role="group" aria-label="筛选"></div>
    <p class="hintbar" id="count"></p>
    <div class="grid" id="grid"></div>
    <footer>
      灵感源:<a href="https://github.com/saime428/web-fx-lab/tree/main/cases">10 个获奖站拆解(含运行时实测)→ cases/</a><br>
      选型给 AI 看:<a href="https://github.com/saime428/web-fx-lab/blob/main/INDEX.md">INDEX.md</a> · 交接:<a href="https://github.com/saime428/web-fx-lab/blob/main/HANDOVER.md">HANDOVER.md</a> · MIT License
    </footer>
  </div>
<script>
const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;
// hero 入场已改为纯 CSS 自动播放动画(见 .reveal),无需 JS 触发

// —— 狗粮:canvas 氛围背景(canvas-ambient-bg 机制,互质正弦漂移) ——
(() => {
  const cv = document.getElementById('bg'), ctx = cv.getContext('2d');
  let w, h;
  const resize = () => {
    const dpr = Math.min(devicePixelRatio || 1, 1.5);
    w = cv.width = innerWidth * dpr; h = cv.height = innerHeight * dpr;
    cv.style.width = innerWidth + 'px'; cv.style.height = innerHeight + 'px';
  };
  resize(); addEventListener('resize', () => { resize(); if (REDUCED) draw(9); });
  const blobs = [
    { fx: .28, fy: .30, r: .55, sx: .00023, sy: .00017, p: 0,   ax: .16, ay: .10, color: 'rgba(139,124,246,.5)' },
    { fx: .74, fy: .45, r: .5,  sx: .00019, sy: .00029, p: 2.1, ax: .14, ay: .14, color: 'rgba(71,216,255,.28)' },
    { fx: .5,  fy: .8,  r: .6,  sx: .00013, sy: .00021, p: 4.4, ax: .18, ay: .09, color: 'rgba(255,124,92,.22)' },
  ];
  function draw(t) {
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = '#101014'; ctx.fillRect(0, 0, w, h);
    ctx.globalCompositeOperation = 'lighter';
    blobs.forEach(b => {
      const x = (b.fx + Math.sin(t * b.sx + b.p) * b.ax) * w;
      const y = (b.fy + Math.cos(t * b.sy + b.p) * b.ay) * h;
      const g = ctx.createRadialGradient(x, y, 0, x, y, b.r * Math.max(w, h));
      g.addColorStop(0, b.color); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
    });
  }
  draw(0);                                                  // 先同步画一帧,rAF 未起也有画面
  if (REDUCED) return;
  let running = true;
  document.addEventListener('visibilitychange', () => { running = !document.hidden; if (running) requestAnimationFrame(loop); });
  function loop(t) { draw(t); if (running) requestAnimationFrame(loop); }
  requestAnimationFrame(loop);
})();

(async () => {
  const grid = document.getElementById('grid'), count = document.getElementById('count');
  const fail = () => {
    grid.innerHTML = '<div class="fallback">索引加载失败(本地 file:// 打开属预期)。<br><a href="https://github.com/saime428/web-fx-lab#pattern-索引">去 GitHub 看列表 ↗</a></div>';
  };
  try {
    const md = await (await fetch('INDEX.md')).text();
    // 按表头名定位列,不按索引——INDEX.md 调整列序不至于崩
    const lines = md.split('\n');
    const head = lines.findIndex(l => l.includes('| Pattern |'));
    if (head < 0) return fail();
    const cols = lines[head].split('|').map(s => s.trim());
    const col = name => cols.indexOf(name);
    const [cPat, cName, cLv, cMech] = [col('Pattern'), col('名称'), col('难度'), col('一句话机制')];
    const items = [];
    for (let i = head + 2; i < lines.length && lines[i].trim().startsWith('|'); i++) {
      const c = lines[i].split('|').map(s => s.trim());
      const link = /\[([^\]]+)\]\(([^)]+)\)/.exec(c[cPat] || '');
      if (!link) continue;
      items.push({ path: link[2], id: link[1], name: c[cName], lv: c[cLv], mech: c[cMech], cat: link[1].split('/')[0] });
    }
    if (!items.length) return fail();
    grid.innerHTML = items.map(p => `
      <a class="card" href="${p.path}demo.html" target="_blank" rel="noopener" title="${p.mech}"
         data-cat="${p.cat}" data-lv="${p.lv}" data-id="${p.id.split('/')[1]}">
        <div class="view"><iframe src="${p.path}demo.html" loading="lazy" title="${p.name} 预览" tabindex="-1"></iframe></div>
        <div class="meta"><b>${p.name}</b><span class="cat">${p.cat}</span><span class="lv">${p.lv}</span></div>
      </a>`).join('');

    // —— 切片2:筛选 + URL 状态 ——
    // 套餐表解析(短名 → 卡片 data-id)
    const setHead = lines.findIndex(l => l.includes('| 场景 |'));
    const sets = [];
    for (let i = setHead + 2; setHead > 0 && i < lines.length && lines[i].trim().startsWith('|'); i++) {
      const c = lines[i].split('|').map(s => s.trim());
      sets.push({ label: (c[1] || '').split('/')[0].trim(), ids: (c[2] || '').split('+').map(s => s.trim()) });
    }
    const cats = [...new Set(items.map(p => p.cat))];
    const state = { cat: '', level: '', set: '' };            // set 与 cat/level 互斥
    const bar = document.getElementById('filters');
    const chip = (label, key, val) => `<button class="chip" data-key="${key}" data-val="${val}" aria-pressed="false">${label}</button>`;
    bar.innerHTML = chip('全部', '', '')
      + cats.map(c => chip(c, 'cat', c)).join('')
      + '<span class="sep">|</span>' + ['★','★★','★★★'].map((s, i) => chip(s, 'level', i + 1)).join('')
      + '<span class="sep">|</span>' + sets.map((s, i) => chip('套餐·' + s.label, 'set', i + 1)).join('');
    function apply() {
      const cards = [...grid.querySelectorAll('.card')];
      const setIds = state.set ? sets[state.set - 1].ids : null;
      let shown = 0;
      cards.forEach(el => {                                   // 只切显隐,不重建 iframe
        const ok = setIds ? setIds.includes(el.dataset.id)
          : (!state.cat || el.dataset.cat === state.cat) && (!state.level || el.dataset.lv.length === +state.level);
        el.hidden = !ok; if (ok) shown++;
      });
      count.textContent = `${shown} / ${items.length} 个 pattern · 预览只读,点卡片全屏试玩`;
      bar.querySelectorAll('.chip').forEach(b => b.setAttribute('aria-pressed',
        b.dataset.key === '' ? String(!state.cat && !state.level && !state.set) : String(state[b.dataset.key] == b.dataset.val)));
      const q = new URLSearchParams(Object.entries(state).filter(([, v]) => v));
      history.replaceState(null, '', q.size ? '?' + q : location.pathname);
    }
    bar.addEventListener('click', e => {
      const b = e.target.closest('.chip'); if (!b) return;
      const { key, val } = b.dataset;
      if (!key) Object.assign(state, { cat: '', level: '', set: '' });
      else if (key === 'set') Object.assign(state, { cat: '', level: '', set: state.set == val ? '' : val });
      else { state.set = ''; state[key] = state[key] == val ? '' : val; }   // 再点一次取消
      apply();
    });
    const q = new URLSearchParams(location.search);           // 回放 URL 状态
    ['cat', 'level', 'set'].forEach(k => state[k] = q.get(k) || '');
    apply();

    // —— 狗粮:卡片 scroll-reveal 入场(patterns/scroll/scroll-reveal 机制) ——
    const cardEls = [...grid.querySelectorAll('.card')];
    if (REDUCED || !('IntersectionObserver' in window)) cardEls.forEach(c => c.classList.add('in'));  // 无 IO/降级:直接显示,不留隐形卡
    else {
      const revIO = new IntersectionObserver(es => es.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('in'); revIO.unobserve(e.target); }
      }), { rootMargin: '0px 0px -8% 0px' });
      cardEls.forEach(c => revIO.observe(c));
    }

    // —— 切片3:自动演示引擎(滚动型 demo 在只读预览里缓慢往复滚动) ——
    if (!REDUCED) {
      const anim = [];                                        // { win, max, phase }
      const vis = new WeakSet();
      const io = new IntersectionObserver(es => es.forEach(e =>
        e.isIntersecting ? vis.add(e.target) : vis.delete(e.target)), { rootMargin: '50px' });
      grid.addEventListener('load', e => {                    // iframe load 不冒泡,capture 接
        const f = e.target; if (f.tagName !== 'IFRAME') return;
        try {
          const doc = f.contentDocument, root = doc.scrollingElement || doc.documentElement;
          const snap = [doc.documentElement, doc.body].some(el => getComputedStyle(el).scrollSnapType !== 'none');
          const max = root.scrollHeight - f.clientHeight;
          if (snap || max < f.clientHeight * .5) return;      // snap 卡和单屏 demo:保持静态
          anim.push({ card: f.closest('.card'), win: f.contentWindow, max, phase: anim.length * 1.7 });
          io.observe(f.closest('.card'));
        } catch (_) { /* 探测失败即静态,不致命 */ }
      }, true);
      (function loop(t) {
        anim.forEach(a => {
          if (!vis.has(a.card) || a.card.hidden) return;      // 只滚可见卡
          a.win.scrollTo(0, (0.5 - 0.5 * Math.cos(t / 7000 * Math.PI + a.phase)) * a.max);
        });
        requestAnimationFrame(loop);
      })(0);
    }
  } catch (e) { fail(); }
})();
</script>
</body>
</html>
